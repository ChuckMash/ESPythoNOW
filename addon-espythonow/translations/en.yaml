configuration:
  interface:
    name: Wireless Interface
    description: Dedicated wireless interface for ESP-NOW (e.g. wlan1). Must support monitor mode. A separate dedicated interface is strongly recommended.
  channel:
    name: Channel
    description: WiFi channel to listen and operate on (1-13). Must match the channel used by your ESP-NOW devices.
  set_interface:
    name: Set Monitor Mode & Channel
    description: Automatically configure the interface into monitor mode and set the channel on startup. Disable if you manage the interface yourself.
  mtu:
    name: MTU Override
    description: Set the MTU for the interface. Use 0 to leave unchanged.
  rate:
    name: PHY Rate Override
    description: Set the PHY rate for the interface. Use 0 to leave unchanged. Performance may depend on driver and chipset.
  send_raw:
    name: Send Raw Packets
    description: Send using raw packets instead of the default method. Can be faster but may be unstable depending on your driver and chipset.
  no_wait:
    name: No Wait on Send
    description: Don't wait for ACK confirmation when sending unicast messages. Speeds up sending but disables L2 retry.
  retry_limit:
    name: L2 Retry Limit
    description: Set the L2 retry limit for sending. Use 0 for the driver default.
  repeat:
    name: Packet Repeat Count
    description: Force packet retransmission N times on send. Use 0 to disable.
  accept_broadcast:
    name: Accept Broadcast
    description: Accept broadcast ESP-NOW messages intended for all devices.
  accept_all:
    name: Accept All Messages
    description: Accept all ESP-NOW messages regardless of the intended destination MAC address. Useful for sniffing all nearby ESP-NOW traffic.
  accept_ack:
    name: Accept ACK Callbacks
    description: Execute the receive callback when ACK confirmation packets are received.
  block_on_send:
    name: Block on Send
    description: Block and wait for ACK from the receiving device before continuing after a send operation.
  primary_key:
    name: Primary Master Key
    description: 16-character primary master key for encrypted ESP-NOW. Leave blank to disable encryption. Always use your own unique key.
  local_key:
    name: Local Master Key
    description: 16-character local master key for encrypted ESP-NOW. Leave blank to disable encryption. Must match the key configured on your ESP-NOW devices.
  mqtt:
    name: MQTT Options
    description: MQTT Options
  mqtt_host:
    name: MQTT Host
    description: IP address or hostname of your MQTT broker. Leave blank to disable MQTT publishing. The Mosquitto broker add-on can be referenced as core-mosquitto.
  mqtt_port:
    name: MQTT Port
    description: MQTT broker port. Default is 1883. Use 8883 for TLS.
  mqtt_username:
    name: MQTT Username
    description: Username for MQTT broker authentication. Leave blank if your broker does not require authentication.
  mqtt_password:
    name: MQTT Password
    description: Password for MQTT broker authentication. Leave blank if your broker does not require authentication.
  mqtt_keepalive:
    name: MQTT Keepalive
    description: MQTT keepalive interval in seconds. Controls how often the client pings the broker to keep the connection alive.
  mqtt_raw:
    name: Publish Raw Bytes
    description: Publish the raw bytes payload to MQTT.
  mqtt_hex:
    name: Publish Hex
    description: Publish hex-encoded data to MQTT. Useful for debugging and inspecting raw payloads.
  mqtt_json:
    name: Publish JSON
    description: Publish JSON-formatted data to MQTT if a decoder exists for the received message type.
  mqtt_ack:
    name: Publish ACK
    description: Publish ACK delivery confirmations to MQTT when a sent message is acknowledged by the receiving device.
  mqtt_ha:
    name: Home Assistant MQTT
    description: Set True to automatically connect to internal home assistant MQTT broker. False to use MQTT broker details above.
